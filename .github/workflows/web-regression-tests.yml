name: Web Automation

on:
  push:

  pull_request:

jobs:
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: |
          cd web-tests
          npm install

      - run: |
          cd web-tests
          npx playwright install

      - run: |
          cd web-tests
          npx playwright test \
          --grep "@regression"

      - uses: actions/upload-artifact@v4
        if: always()

        with:
          name: playwright-report

          path: web-tests/playwright-report
